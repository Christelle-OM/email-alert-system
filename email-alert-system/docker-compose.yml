version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Alert System}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./alerts.db}
      - DEBUG=${DEBUG:-False}
    volumes:
      - ./backend:/app
    command: python run.py

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=email_alerts
      - POSTGRES_USER=${DB_USER:-alerts}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    profiles:
      - postgres

volumes:
  postgres_data:
