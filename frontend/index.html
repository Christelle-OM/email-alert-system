<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Alert System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>📧 Email Alert System</h1>
                <p>Send and manage email notifications</p>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="nav-tabs">
            <button class="nav-tab active" data-tab="send-alert">Send Alert</button>
            <button class="nav-tab" data-tab="bulk-alert">Bulk Send</button>
            <button class="nav-tab" data-tab="subscribers">Subscribers</button>
            <button class="nav-tab" data-tab="history">Alert History</button>
            <button class="nav-tab" data-tab="stats">Statistics</button>
        </nav>

        <!-- Content -->
        <main class="main-content">
            <!-- Send Alert Tab -->
            <section id="send-alert" class="tab-content active">
                <div class="card">
                    <h2>Send Individual Alert</h2>
                    <form id="send-alert-form">
                        <div class="form-group">
                            <label for="recipient">Recipient Email *</label>
                            <input type="email" id="recipient" placeholder="recipient@example.com" required>
                        </div>
                        <div class="form-group">
                            <label for="subject">Subject *</label>
                            <input type="text" id="subject" placeholder="Alert subject" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message *</label>
                            <textarea id="message" placeholder="Enter your message here..." rows="6" required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="schedule-time">Schedule (Optional)</label>
                            <input type="datetime-local" id="schedule-time">
                        </div>
                        <button type="submit" class="btn btn-primary">Send Alert</button>
                        <div id="alert-status" class="alert hidden"></div>
                    </form>
                </div>
            </section>

            <!-- Bulk Alert Tab -->
            <section id="bulk-alert" class="tab-content">
                <div class="card">
                    <h2>Send Bulk Alerts</h2>
                    <form id="bulk-alert-form">
                        <div class="form-group">
                            <label for="bulk-recipients">Recipient Emails (one per line) *</label>
                            <textarea id="bulk-recipients" placeholder="email1@example.com&#10;email2@example.com&#10;email3@example.com" rows="6" required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="bulk-subject">Subject *</label>
                            <input type="text" id="bulk-subject" placeholder="Alert subject" required>
                        </div>
                        <div class="form-group">
                            <label for="bulk-message">Message *</label>
                            <textarea id="bulk-message" placeholder="Enter your message here..." rows="6" required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="bulk-schedule-time">Schedule (Optional)</label>
                            <input type="datetime-local" id="bulk-schedule-time">
                        </div>
                        <button type="submit" class="btn btn-primary">Send Bulk Alerts</button>
                        <div id="bulk-status" class="alert hidden"></div>
                    </form>
                </div>
            </section>

            <!-- Subscribers Tab -->
            <section id="subscribers" class="tab-content">
                <div class="card">
                    <h2>Manage Subscribers</h2>
                    <form id="subscriber-form">
                        <div class="form-group">
                            <label for="subscriber-email">Email Address *</label>
                            <input type="email" id="subscriber-email" placeholder="subscriber@example.com" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Add Subscriber</button>
                        <div id="subscriber-status" class="alert hidden"></div>
                    </form>
                </div>

                <div class="card">
                    <h2>Subscriber List</h2>
                    <div id="subscribers-list" class="list-container">
                        <p class="loading">Loading subscribers...</p>
                    </div>
                </div>
            </section>

            <!-- Alert History Tab -->
            <section id="history" class="tab-content">
                <div class="card">
                    <h2>Alert History</h2>
                    <div class="filters">
                        <select id="status-filter">
                            <option value="">All Status</option>
                            <option value="sent">Sent</option>
                            <option value="failed">Failed</option>
                            <option value="pending">Pending</option>
                        </select>
                        <button class="btn btn-secondary" onclick="loadAlertHistory()">Refresh</button>
                    </div>
                    <div id="alerts-list" class="list-container">
                        <p class="loading">Loading alerts...</p>
                    </div>
                </div>
            </section>

            <!-- Statistics Tab -->
            <section id="stats" class="tab-content">
                <div class="card">
                    <h2>System Statistics</h2>
                    <div id="stats-container" class="stats-grid">
                        <p class="loading">Loading statistics...</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Email Alert System v1.0.0 | API Status: <span id="api-status">Checking...</span></p>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
